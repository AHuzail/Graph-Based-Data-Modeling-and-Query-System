<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph-Based Data Query System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
        }

        .graph-section {
            flex: 1;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-section {
            width: 350px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }

        #network {
            flex: 1;
            background: #fafafa;
            min-height: 420px;
        }

        .graph-toolbar {
            padding: 8px 16px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .graph-toolbar input,
        .graph-toolbar select {
            padding: 6px 8px;
            border: 1px solid #d7d7d7;
            border-radius: 4px;
            font-size: 12px;
            background: #fff;
        }

        .graph-toolbar button {
            padding: 6px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #fff;
            background: #667eea;
        }

        .graph-toolbar button.secondary {
            background: #607d8b;
        }

        .graph-toolbar button.purple {
            background: #764ba2;
        }

        .node-inspector {
            border-top: 1px solid #e0e0e0;
            background: #ffffff;
            padding: 10px 14px;
            min-height: 96px;
            max-height: 140px;
            overflow: auto;
            font-size: 12px;
        }

        .node-inspector h3 {
            font-size: 12px;
            margin-bottom: 6px;
            color: #455a64;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.bot {
            text-align: left;
        }

        .message-content {
            display: inline-block;
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-content p {
            margin: 0 0 6px 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul {
            margin: 6px 0 6px 16px;
            padding: 0;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.08);
            padding: 1px 4px;
            border-radius: 4px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 12px;
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.08);
            padding: 8px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.bot .message-content {
            background: #e0e0e0;
            color: #333;
        }

        .message.system .message-content {
            background: #fff3cd;
            color: #856404;
            font-size: 12px;
            font-style: italic;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #e0e0e0;
            background: white;
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .chat-input-area button {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .chat-input-area button:hover {
            background: #5568d3;
        }

        .chat-input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .quick-queries {
            padding: 12px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }

        .quick-query-btn {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 8px;
            margin: 4px 2px 4px 0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            border: none;
            transition: background 0.2s;
        }

        .quick-query-btn:hover {
            background: #e0e0e0;
        }

        .stats-bar {
            padding: 12px 16px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            gap: 20px;
            font-size: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .node-details {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
        }

        .node-details-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: #667eea;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="graph-section">
                <div class="header">
                    <h1>SAP Order-to-Cash Data Graph</h1>
                    <p>Explore relationships between orders, deliveries, invoices, and payments</p>
                </div>
                <div class="graph-toolbar">
                    <button onclick="fitToView()">📍 Fit Graph</button>
                    <button onclick="zoomIn()" class="purple">🔍 Zoom +</button>
                    <button onclick="zoomOut()" class="purple">🔍 Zoom -</button>
                    <input type="text" id="nodeSearch" placeholder="Search node id..." />
                    <button onclick="searchAndFocusNode()" class="secondary">Find</button>
                    <select id="typeFilter">
                        <option value="all">All Types</option>
                    </select>
                    <button onclick="applyTypeFilter()" class="secondary">Apply Filter</button>
                    <button onclick="resetGraphView()" class="secondary">Reset</button>
                </div>
                <div class="stats-bar" id="statsBar">
                    <div class="stat-item">
                        <div class="stat-label">Nodes</div>
                        <div class="stat-value" id="nodeCount">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Edges</div>
                        <div class="stat-value" id="edgeCount">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Orders</div>
                        <div class="stat-value" id="orderCount">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Deliveries</div>
                        <div class="stat-value" id="deliveryCount">-</div>
                    </div>
                </div>
                <div id="network"></div>
                <div class="node-inspector" id="nodeInspector">
                    <h3>Node Details</h3>
                    <div id="nodeInfo">Click any node to inspect details and connected neighbors.</div>
                </div>
            </div>
        </div>

        <div class="chat-section">
            <div class="header">
                <h1>Ask Questions</h1>
                <p>Query your data with natural language</p>
            </div>

            <div class="quick-queries">
                <strong style="display: block; margin-bottom: 6px;">Quick Questions:</strong>
                <button class="quick-query-btn" onclick="askQuestion('Which products have the most billing documents?')">Top Products</button>
                <button class="quick-query-btn" onclick="askQuestion('Show incomplete orders - delivered but not billed')">Incomplete Flows</button>
                <button class="quick-query-btn" onclick="askQuestion('Trace the complete flow of order 740506')">Trace Order</button>
            </div>

            <div id="chatMessages"></div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ask a question..." />
                <button onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000/api';
        let network = null;
        let nodes = new vis.DataSet();
        let edges = new vis.DataSet();
        let selectedNodeId = null;
        let allNodesData = [];
        let allEdgesData = [];

        // Color mapping for node types
        const nodeColors = {
            order: '#667eea',
            delivery: '#764ba2',
            invoice: '#f093fb',
            product: '#4facfe',
            customer: '#43e97b',
            payment: '#fa709a',
            journal_entry: '#fee140',
            plant: '#30b0fe'
        };

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            initializeChat();
            await loadGraphData();
            initializeNetwork();
            setupEventListeners();
        });

        function initializeChat() {
            const chatMessages = document.getElementById('chatMessages');
            const welcomeMsg = document.createElement('div');
            welcomeMsg.className = 'message bot';
            welcomeMsg.innerHTML = `<div class="message-content">
                👋 Welcome to the Graph Query System!<br><br>
                I can help you explore your SAP Order-to-Cash data. Try asking about:
                <ul style="margin-left: 16px; margin-top: 8px;">
                    <li>Top products by billing count</li>
                    <li>Document flow tracing</li>
                    <li>Incomplete workflows</li>
                    <li>Customer orders</li>
                </ul>
            </div>`;
            chatMessages.appendChild(welcomeMsg);
        }

        async function loadGraphData() {
            try {
                const response = await fetch(`${API_BASE}/graph/summary`);
                const data = await response.json();

                // Update stats
                document.getElementById('nodeCount').textContent = data.total_nodes || '-';
                document.getElementById('edgeCount').textContent = data.total_edges || '-';
                document.getElementById('orderCount').textContent = data.node_types?.order || '-';
                document.getElementById('deliveryCount').textContent = data.node_types?.delivery || '-';

                // Load full graph data from backend
                await loadFullGraph(data);
            } catch (error) {
                console.error('Error loading graph data:', error);
                addSystemMessage('Failed to load graph data.');
            }
        }

        async function loadFullGraph(summary) {
            try {
                // Load graph from new /api/graph/all endpoint
                const response = await fetch(`${API_BASE}/graph/all?connected=true&limit=400&max_edges=1800`);
                
                if (!response.ok) {
                    throw new Error('Failed to load full graph');
                }
                
                const graphData = await response.json();
                
                // Clear and populate nodes and edges
                nodes.clear();
                edges.clear();
                
                // Add nodes with proper colors
                if (graphData.nodes && graphData.nodes.length > 0) {
                    allNodesData = graphData.nodes;
                    graphData.nodes.forEach(node => {
                        const nodeType = node.type || 'unknown';
                        nodes.add({
                            id: node.id,
                            label: String(node.id).substring(0, 14),
                            color: nodeColors[nodeType] || '#999999',
                            title: `${nodeType} (ID: ${node.id})`,
                            group: nodeType
                        });
                    });
                }
                
                // Add edges
                if (graphData.edges && graphData.edges.length > 0) {
                    allEdgesData = graphData.edges;
                    graphData.edges.forEach(edge => {
                        edges.add({
                            from: edge.from,
                            to: edge.to,
                            label: '',
                            arrows: 'to'
                        });
                    });
                }

                if (!graphData.nodes || graphData.nodes.length === 0) {
                    addSystemMessage('Graph returned no nodes. Please check backend data loading.');
                }
                
                console.log(`Loaded ${graphData.nodes.length} nodes and ${graphData.edges.length} edges`);
                populateTypeFilter();
            } catch (error) {
                console.error('Error loading full graph:', error);
                addSystemMessage('Failed to load full graph. Please check backend logs.');
            }
        }

        function createSampleGraph(summary) {
            // Create representative nodes
            const nodeData = [
                { id: 'order_sample', label: 'Sales Order\n(740506)', color: nodeColors.order, title: 'Sales Order Example' },
                { id: 'delivery_sample', label: 'Delivery\n(80737721)', color: nodeColors.delivery, title: 'Outbound Delivery' },
                { id: 'invoice_sample', label: 'Invoice\n(90504248)', color: nodeColors.invoice, title: 'Billing Document' },
                { id: 'customer_sample', label: 'Customer\n(310000108)', color: nodeColors.customer, title: 'Business Partner' },
                { id: 'product_sample', label: 'Product\n(3001456)', color: nodeColors.product, title: 'Material' },
                { id: 'payment_sample', label: 'Payment', color: nodeColors.payment, title: 'Accounts Receivable' },
            ];

            const edgeData = [
                { from: 'order_sample', to: 'delivery_sample', label: 'creates', arrows: 'to' },
                { from: 'order_sample', to: 'invoice_sample', label: 'billed_by', arrows: 'to' },
                { from: 'order_sample', to: 'customer_sample', label: 'placed_by', arrows: 'to' },
                { from: 'order_sample', to: 'product_sample', label: 'contains', arrows: 'to' },
                { from: 'invoice_sample', to: 'payment_sample', label: 'paid_by', arrows: 'to' },
                { from: 'delivery_sample', to: 'product_sample', label: 'contains', arrows: 'to' },
            ];

            nodes.clear();
            edges.clear();
            nodeData.forEach(n => nodes.add(n));
            edgeData.forEach(e => edges.add(e));
        }

        function initializeNetwork() {
            const container = document.getElementById('network');
            const data = {
                nodes: nodes,
                edges: edges
            };

            const options = {
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -4000,
                        springLength: 120,
                        springConstant: 0.04
                    },
                    stabilization: {
                        enabled: true,
                        iterations: 160,
                        updateInterval: 25
                    }
                },
                nodes: {
                    shape: 'dot',
                    size: 8,
                    borderWidth: 1,
                    font: { size: 9, face: 'Inter' }
                },
                edges: {
                    color: { color: '#b9d9f7', opacity: 0.55 },
                    smooth: false,
                    arrows: { to: { enabled: true, scaleFactor: 0.5 } }
                },
                interaction: {
                    hover: true,
                    navigationButtons: true,
                    keyboard: true,
                    tooltipDelay: 120
                }
            };

            network = new vis.Network(container, data, options);

            network.once('stabilized', () => {
                fitToView();
            });

            network.on('click', async function(params) {
                if (params.nodes.length > 0) {
                    selectedNodeId = params.nodes[0];
                    highlightNeighborhood(selectedNodeId);
                    await showNodeDetails(selectedNodeId);
                } else {
                    resetGraphStyles();
                }
            });
        }

        function populateTypeFilter() {
            const select = document.getElementById('typeFilter');
            if (!select) return;

            const types = [...new Set(allNodesData.map(n => n.type || 'unknown'))].sort();
            select.innerHTML = '<option value="all">All Types</option>';
            types.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                select.appendChild(option);
            });
        }

        function applyTypeFilter() {
            const select = document.getElementById('typeFilter');
            const selectedType = select ? select.value : 'all';

            if (selectedType === 'all') {
                nodes.clear();
                edges.clear();
                allNodesData.forEach(node => {
                    const nodeType = node.type || 'unknown';
                    nodes.add({
                        id: node.id,
                        label: String(node.id).substring(0, 14),
                        color: nodeColors[nodeType] || '#999999',
                        title: `${nodeType} (ID: ${node.id})`,
                        group: nodeType
                    });
                });
                allEdgesData.forEach(edge => {
                    edges.add({ from: edge.from, to: edge.to, label: '', arrows: 'to' });
                });
            } else {
                const visibleNodeIds = new Set(
                    allNodesData.filter(n => (n.type || 'unknown') === selectedType).map(n => n.id)
                );

                const filteredEdges = allEdgesData.filter(
                    e => visibleNodeIds.has(e.from) || visibleNodeIds.has(e.to)
                );

                filteredEdges.forEach(e => {
                    visibleNodeIds.add(e.from);
                    visibleNodeIds.add(e.to);
                });

                nodes.clear();
                edges.clear();

                allNodesData.filter(n => visibleNodeIds.has(n.id)).forEach(node => {
                    const nodeType = node.type || 'unknown';
                    nodes.add({
                        id: node.id,
                        label: String(node.id).substring(0, 14),
                        color: nodeColors[nodeType] || '#999999',
                        title: `${nodeType} (ID: ${node.id})`,
                        group: nodeType
                    });
                });

                filteredEdges.forEach(edge => {
                    edges.add({ from: edge.from, to: edge.to, label: '', arrows: 'to' });
                });
            }

            fitToView();
        }

        function searchAndFocusNode() {
            const input = document.getElementById('nodeSearch');
            const term = (input ? input.value : '').trim().toLowerCase();
            if (!term) return;

            const match = allNodesData.find(n => String(n.id).toLowerCase().includes(term));
            if (!match) {
                addSystemMessage(`No node found for: ${term}`);
                return;
            }

            if (network) {
                network.selectNodes([match.id]);
                network.focus(match.id, {
                    scale: 1.2,
                    animation: { duration: 600, easingFunction: 'easeInOutQuad' }
                });
                highlightNeighborhood(match.id);
                showNodeDetails(match.id);
            }
        }

        function highlightNeighborhood(nodeId) {
            if (!network || !nodeId) return;

            const connectedNodes = new Set(network.getConnectedNodes(nodeId));
            connectedNodes.add(nodeId);

            const nodeUpdates = nodes.get().map(n => ({
                id: n.id,
                opacity: connectedNodes.has(n.id) ? 1 : 0.2
            }));

            const edgeUpdates = edges.get().map(e => {
                const inNeighborhood = connectedNodes.has(e.from) && connectedNodes.has(e.to);
                return { id: e.id, color: { color: inNeighborhood ? '#5aa9e6' : '#dcdcdc', opacity: inNeighborhood ? 0.9 : 0.15 } };
            });

            nodes.update(nodeUpdates);
            edges.update(edgeUpdates);
        }

        function resetGraphStyles() {
            const nodeUpdates = nodes.get().map(n => ({ id: n.id, opacity: 1 }));
            const edgeUpdates = edges.get().map(e => ({ id: e.id, color: { color: '#b9d9f7', opacity: 0.55 } }));
            nodes.update(nodeUpdates);
            edges.update(edgeUpdates);
        }

        function resetGraphView() {
            const typeFilter = document.getElementById('typeFilter');
            const nodeSearch = document.getElementById('nodeSearch');
            if (typeFilter) typeFilter.value = 'all';
            if (nodeSearch) nodeSearch.value = '';
            applyTypeFilter();
            resetGraphStyles();
            fitToView();
        }

        function fitToView() {
            if (network) {
                network.fit({
                    animation: {
                        duration: 500,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            }
        }

        function zoomIn() {
            if (network) {
                const scale = network.getScale();
                network.moveTo({
                    scale: scale * 1.3,
                    animation: {
                        duration: 300,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            }
        }

        function zoomOut() {
            if (network) {
                const scale = network.getScale();
                network.moveTo({
                    scale: scale / 1.3,
                    animation: {
                        duration: 300,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            }
        }

        async function showNodeDetails(nodeId) {
            try {
                const response = await fetch(`${API_BASE}/graph/node/${nodeId}`);
                const data = await response.json();
                const info = document.getElementById('nodeInfo');
                if (!info) return;

                if (!response.ok || data.error) {
                    info.innerHTML = `<strong>${escapeHtml(nodeId)}</strong><br>${escapeHtml(data.error || 'Unable to load node details.')}`;
                    return;
                }

                const type = data.type || 'unknown';
                const id = data.id || nodeId;
                const amount = data.amount !== undefined ? data.amount : 'N/A';
                const status = data.status || 'N/A';
                const date = data.date || 'N/A';
                const connections = network ? network.getConnectedNodes(nodeId).length : 0;

                info.innerHTML = `
                    <strong>${escapeHtml(String(type).toUpperCase())}</strong><br>
                    ID: ${escapeHtml(String(id))}<br>
                    Status: ${escapeHtml(String(status))}<br>
                    Date: ${escapeHtml(String(date))}<br>
                    Amount: ${escapeHtml(String(amount))}<br>
                    Connections: ${connections}
                `;
            } catch (error) {
                console.error('Error loading node details:', error);
            }
        }

        function setupEventListeners() {
            const chatInput = document.getElementById('chatInput');
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            const nodeSearch = document.getElementById('nodeSearch');
            if (nodeSearch) {
                nodeSearch.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        searchAndFocusNode();
                    }
                });
            }

            const typeFilter = document.getElementById('typeFilter');
            if (typeFilter) {
                typeFilter.addEventListener('change', () => applyTypeFilter());
            }
        }

        async function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = chatInput.value.trim();

            if (!message) return;

            sendBtn.disabled = true;

            // Add user message to chat
            addMessage(message, 'user');
            chatInput.value = '';

            // Show loading indicator
            addMessage('', 'bot');
            const lastBotMessage = document.getElementById('chatMessages').lastChild;
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            lastBotMessage.querySelector('.message-content').appendChild(spinner);

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Remove loading message
                lastBotMessage.remove();

                if (!response.ok) {
                    addMessage(data.error || 'Backend error while processing question.', 'system');
                    return;
                }

                if (data.valid === false) {
                    // Show error/guardrail message
                    addMessage(data.response || 'Query outside dataset scope.', 'system');
                } else {
                    // Show response
                    addMessage(data.response || 'No response', 'bot');
                    if (data.query_explanation) {
                        addSystemMessage(`Query: ${data.query_explanation}`);
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                lastBotMessage.remove();
                addMessage('Error processing query. Make sure the backend is running.', 'system');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function askQuestion(question) {
            document.getElementById('chatInput').value = question;
            sendMessage();
        }

        function addMessage(text, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            const rendered = type === 'user' ? escapeHtml(text) : renderMarkdown(text);
            messageDiv.innerHTML = `<div class="message-content">${rendered}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addSystemMessage(text) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.innerHTML = `<div class="message-content">${renderMarkdown(text)}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function renderMarkdown(text) {
            if (!text) return '';

            let html = escapeHtml(text);

            // Fenced code blocks
            html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold and italic
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Convert bullet lines to list blocks
            const lines = html.split(/\r?\n/);
            const out = [];
            let inList = false;

            for (const line of lines) {
                const trimmed = line.trim();
                const bullet = /^[-*]\s+(.+)$/.exec(trimmed);
                if (bullet) {
                    if (!inList) {
                        out.push('<ul>');
                        inList = true;
                    }
                    out.push(`<li>${bullet[1]}</li>`);
                } else {
                    if (inList) {
                        out.push('</ul>');
                        inList = false;
                    }
                    if (trimmed.length > 0) {
                        out.push(`<p>${trimmed}</p>`);
                    }
                }
            }

            if (inList) {
                out.push('</ul>');
            }

            return out.join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
