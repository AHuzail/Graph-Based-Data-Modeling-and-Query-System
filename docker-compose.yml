version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DEBUG=False
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DATA_DIR=/app/../sap-o2c-data
    volumes:
      - ./sap-o2c-data:/app/../sap-o2c-data
      - ./backend:/app
    networks:
      - graph-network

  frontend:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - graph-network
    depends_on:
      - backend

networks:
  graph-network:
    driver: bridge
